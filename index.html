<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Quality of Life Tracker</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        /* The 3-Column Layout */
        .kids-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .kid-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
        }

        .kid-card h2 {
            text-align: center;
            margin-top: 0;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border-color);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        select, input[type="time"], textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
        }

        /* House State Section */
        .house-state {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        .house-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        button {
            display: block;
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
            padding: 15px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>

    <header>
        <h1>Family Quality of Life Tracker</h1>
        <p>Tägliche Datenerfassung für Analyse & Optimierung</p>
    </header>

    <form id="trackerForm">
        
        <!-- KIDS SECTION (3 COLUMNS) -->
        <div class="kids-grid">
            
            <!-- EMELIA -->
            <div class="kid-card">
                <h2>Emelia</h2>
                <div class="form-group">
                    <label>Schlafzeit (gesteuert)</label>
                    <input type="time" name="emelia_sleep">
                </div>
                <div class="form-group">
                    <label>Aufwachzeit</label>
                    <input type="time" name="emelia_wake">
                </div>
                <div class="form-group">
                    <label>Mood at School</label>
                    <select name="emelia_mood">
                        <option value="gut">Gut 🙂</option>
                        <option value="neutral">Neutral 😐</option>
                        <option value="schlecht">Schlecht 🙁</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Schimpfwörter</label>
                    <select name="emelia_words">
                        <option value="0">Nein</option>
                        <option value="1">Ein paar</option>
                        <option value="2">Viele 🤬</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Schlagen / Tür schlagen</label>
                    <select name="emelia_aggression">
                        <option value="nein">Nein</option>
                        <option value="ja">Ja 💥</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Kinderzimmer Zustand</label>
                    <select name="emelia_room">
                        <option value="clean">Clean ✨</option>
                        <option value="messy">Nicht Clean 🧸</option>
                    </select>
                </div>
            </div>

            <!-- CESAR -->
            <div class="kid-card">
                <h2>Cesar</h2>
                <div class="form-group">
                    <label>Schlafzeit (gesteuert)</label>
                    <input type="time" name="cesar_sleep">
                </div>
                <div class="form-group">
                    <label>Aufwachzeit</label>
                    <input type="time" name="cesar_wake">
                </div>
                <div class="form-group">
                    <label>Mood at School</label>
                    <select name="cesar_mood">
                        <option value="gut">Gut 🙂</option>
                        <option value="neutral">Neutral 😐</option>
                        <option value="schlecht">Schlecht 🙁</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Schimpfwörter</label>
                    <select name="cesar_words">
                        <option value="0">Nein</option>
                        <option value="1">Ein paar</option>
                        <option value="2">Viele 🤬</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Schlagen / Tür schlagen</label>
                    <select name="cesar_aggression">
                        <option value="nein">Nein</option>
                        <option value="ja">Ja 💥</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Kinderzimmer Zustand</label>
                    <select name="cesar_room">
                        <option value="clean">Clean ✨</option>
                        <option value="messy">Nicht Clean 🧸</option>
                    </select>
                </div>
            </div>

            <!-- ARTUR -->
            <div class="kid-card">
                <h2>Artur</h2>
                <div class="form-group">
                    <label>Schlafzeit (gesteuert)</label>
                    <input type="time" name="artur_sleep">
                </div>
                <div class="form-group">
                    <label>Aufwachzeit</label>
                    <input type="time" name="artur_wake">
                </div>
                <div class="form-group">
                    <label>Mood at School</label>
                    <select name="artur_mood">
                        <option value="gut">Gut 🙂</option>
                        <option value="neutral">Neutral 😐</option>
                        <option value="schlecht">Schlecht 🙁</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Schimpfwörter</label>
                    <select name="artur_words">
                        <option value="0">Nein</option>
                        <option value="1">Ein paar</option>
                        <option value="2">Viele 🤬</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Schlagen / Tür schlagen</label>
                    <select name="artur_aggression">
                        <option value="nein">Nein</option>
                        <option value="ja">Ja 💥</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Kinderzimmer Zustand</label>
                    <select name="artur_room">
                        <option value="clean">Clean ✨</option>
                        <option value="messy">Nicht Clean 🧸</option>
                    </select>
                </div>
            </div>

        </div>

        <!-- HOUSEHOLD & SYSTEM STATE -->
        <div class="house-state">
            <h3>Haus & Allgemeiner Zustand</h3>
            <div class="house-grid">
                <div class="form-group">
                    <label>Küche Zustand</label>
                    <select name="kitchen_state">
                        <option value="clean">Sauber ✨</option>
                        <option value="dirty">Unaufgeräumt 🍽️</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Wohnzimmer Zustand</label>
                    <select name="living_room_state">
                        <option value="clean">Sauber ✨</option>
                        <option value="dirty">Chaos 🎲</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Wer schläft im Elternbett?</label>
                    <select name="parents_bed">
                        <option value="none">Niemand</option>
                        <option value="emelia">Emelia</option>
                        <option value="cesar">Cesar</option>
                        <option value="artur">Artur</option>
                        <option value="multiple">Mehrere</option>
                    </select>
                </div>
            </div>
            <div class="form-group" style="margin-top: 15px;">
                <label>Zusätzliche Notizen (Tagebuch / Gute Nacht Geschichte Thema)</label>
                <textarea name="general_notes" rows="3" placeholder="Was haben sie erzählt? Wer war krank?"></textarea>
            </div>
        </div>

        <button type="submit">Daten in AWS speichern</button>

    </form>

    <script>
        // Form submission behavior (we will connect AWS here later)
        document.getElementById('trackerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Hier senden wir die Daten bald an dein AWS API Gateway!');
        });
    </script>
</body>
</html>
