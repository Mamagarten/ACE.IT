<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACE-O-Meter</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --bg-color: #fdfbf7; /* Wärmerer Grundton */
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            
            /* Kid Colors */
            --artur-color: #e3f2fd;   /* Baby Blue */
            --artur-header: #1e88e5;
            --cesar-color: #fff8e1;   /* Gold / Soft Yellow */
            --cesar-header: #f57c00;
            --emelia-color: #fce4ec;  /* Baby Pink */
            --emelia-header: #d81b60;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            /* Spielerisches Hintergrundmuster */
            background-image: 
                radial-gradient(rgba(52, 152, 219, 0.08) 15%, transparent 16%),
                radial-gradient(rgba(241, 196, 15, 0.08) 15%, transparent 16%),
                radial-gradient(rgba(231, 76, 60, 0.05) 10%, transparent 11%);
            background-size: 60px 60px, 40px 40px, 80px 80px;
            background-position: 0 0, 20px 20px, 40px 40px;
            color: var(--primary-color);
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 3rem;
            margin: 0;
            font-weight: 800;
            color: var(--primary-color);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
            letter-spacing: 2px;
        }

        /* Date Section */
        .date-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }
        .date-container input[type="date"] {
            padding: 12px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            border: 2px solid var(--primary-color);
            border-radius: 30px;
            background-color: white;
            color: var(--primary-color);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            outline: none;
        }

        .btn-reset {
            background-color: #e74c3c;
            color: white;
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(231, 76, 60, 0.3);
            transition: all 0.2s;
            width: auto; /* Verhindert Full-Width */
        }
        .btn-reset:hover {
            background-color: #c0392b;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(231, 76, 60, 0.4);
        }

        /* 3-Column Layout for ACE */
        .kids-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .kid-card {
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .kid-card:hover {
            transform: translateY(-3px);
        }

        /* Kid Specific Styles */
        .card-artur { background-color: var(--artur-color); }
        .card-artur h2 { color: var(--artur-header); border-bottom-color: rgba(30, 136, 229, 0.2); }
        
        .card-cesar { background-color: var(--cesar-color); }
        .card-cesar h2 { color: var(--cesar-header); border-bottom-color: rgba(245, 124, 0, 0.2); }
        
        .card-emelia { background-color: var(--emelia-color); }
        .card-emelia h2 { color: var(--emelia-header); border-bottom-color: rgba(216, 27, 96, 0.2); }

        .kid-card h2 {
            text-align: center;
            margin-top: 0;
            padding-bottom: 12px;
            border-bottom: 3px solid;
            font-size: 1.8rem;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 0.9rem;
        }

        select, input[type="time"], input[type="number"], textarea, input[type="text"], input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            font-family: inherit;
            background-color: rgba(255, 255, 255, 0.9);
        }

        /* Section Cards */
        .section-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
        }

        .section-card h3 {
            margin-top: 0;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 8px;
            font-size: 1.4rem;
        }

        .grid-2-col {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .upload-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .upload-box {
            background: #fdfdfd;
            border: 2px dashed #cbd5e1;
            padding: 15px;
            border-radius: 10px;
        }

        .upload-box label {
            color: #475569;
        }

        /* Action Buttons Grid */
        .action-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            max-width: 800px;
            margin: 30px auto;
        }

        button {
            width: 100%;
            padding: 15px;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        .btn-save {
            background-color: #3498db;
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);
        }
        .btn-save:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
        }

        .btn-load {
            background-color: #f1c40f;
            color: #2c3e50;
            box-shadow: 0 4px 10px rgba(241, 196, 15, 0.3);
        }
        .btn-load:hover {
            background-color: #f39c12;
            transform: translateY(-2px);
        }

        .btn-aws {
            background-color: #2ecc71;
            box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3);
        }
        .btn-aws:hover {
            background-color: #27ae60;
            transform: translateY(-2px);
        }

        #fileInput {
            display: none;
        }
    </style>
</head>

        <!-- ALLGEMEINES & HOUSEHOLD -->

        <!-- Hidden File Input for Loading -->

    <script>
        const form = document.getElementById('trackerForm');
        const dateInput = document.getElementById('reportDate');
        const fileInput = document.getElementById('fileInput');

        // --- Hilfsfunktionen für das Datum ---
        function getTodayDateString() {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        }

        // --- Formulardaten extrahieren ---
        function getFormData() {
            const formData = new FormData(form);
            const data = {};
            formData.forEach((value, key) => {
                if (key.startsWith('upload_')) return;
                data[key] = value === "" ? null : value;
            });
            return data;
        }

        // --- Formulardaten setzen ---
        function setFormData(data) {
            form.reset();
            if(data && data.report_date) {
                dateInput.value = data.report_date;
            }
            
            if (!data) return;

            Object.keys(data).forEach(key => {
                const element = form.elements[key];
                if (element) {
                    element.value = data[key] === null ? "" : data[key];
                }
            });
        }

        // --- Automatisches Speichern im Browser (Local Storage) ---
        function autoSaveToBrowser() {
            const currentDate = dateInput.value;
            if (!currentDate) return;
            
            const data = getFormData();
            localStorage.setItem(`ace_meter_${currentDate}`, JSON.stringify(data));
        }

        // --- Daten für ein bestimmtes Datum laden ---
        function loadFromBrowser(dateString) {
            const savedData = localStorage.getItem(`ace_meter_${dateString}`);
            if (savedData) {
                setFormData(JSON.parse(savedData));
            } else {
                setFormData({ report_date: dateString });
            }
        }

        // --- EVENT LISTENERS ---

        // 1. Initialisierung beim Laden der Seite
        window.addEventListener('DOMContentLoaded', () => {
            const today = getTodayDateString();
            dateInput.value = today;
            loadFromBrowser(today);
        });

        // 2. Datum wechseln -> Vorherige Daten laden
        dateInput.addEventListener('change', (e) => {
            loadFromBrowser(e.target.value);
        });

        // 3. Automatisches Speichern bei jeder Änderung im Formular
        form.addEventListener('input', autoSaveToBrowser);
        form.addEventListener('change', autoSaveToBrowser);

        // 4. BUTTON: RESET (Setzt das aktuelle Datum auf Standard zurück)
        document.getElementById('resetFormBtn').addEventListener('click', () => {
            if (confirm("Möchtest du alle Felder für das aktuelle Datum wirklich auf die Standardwerte zurücksetzen?")) {
                const currentDate = dateInput.value;
                setFormData({ report_date: currentDate });
                autoSaveToBrowser(); // Aktualisiert das zurückgesetzte Formular direkt im LocalStorage
            }
        });

        // 5. BUTTON: Lokal als Datei speichern
        document.getElementById('saveLocalBtn').addEventListener('click', () => {
            const data = getFormData();
            const dateStr = data.report_date || getTodayDateString();
            const jsonString = JSON.stringify(data, null, 2);
            
            const blob = new Blob([jsonString], { type: "application/json" });
            const link = document.createElement("a");
            
            link.download = `ace-o-meter_${dateStr}.json`;
            link.href = window.URL.createObjectURL(blob);
            link.click();
            window.URL.revokeObjectURL(link.href);
        });

        // 6. BUTTON: Datei laden Trigger
        document.getElementById('loadLocalBtn').addEventListener('click', () => {
            fileInput.click();
        });

        // File-Input Handler für das Laden einer JSON Datei
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(evt) {
                try {
                    const data = JSON.parse(evt.target.result);
                    setFormData(data);
                    if(data.report_date) {
                        localStorage.setItem(`ace_meter_${data.report_date}`, JSON.stringify(data));
                    }
                    alert("Datei erfolgreich geladen und importiert!");
                } catch (err) {
                    alert("Fehler: Ungültiges Dateiformat!");
                }
            };
            reader.readAsText(file);
            e.target.value = ''; 
        });

        // 7. BUTTON: Zu AWS senden
        document.getElementById('uploadAwsBtn').addEventListener('click', () => {
            const data = getFormData();
            console.log("AWS Payload:", data);
            alert('Daten bereit für das AWS API Gateway! (Payload in der Konsole sichtbar)');
        });
    </script>
</body>
</html>
