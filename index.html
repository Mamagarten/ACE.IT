<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACE-O-Meter</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --bg-color: #fdfbf7; /* Wärmerer Grundton */
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            
            /* Kid Colors */
            --artur-color: #e3f2fd;   /* Baby Blue */
            --artur-header: #1e88e5;
            --cesar-color: #fff8e1;   /* Gold / Soft Yellow */
            --cesar-header: #f57c00;
            --emelia-color: #fce4ec;  /* Baby Pink */
            --emelia-header: #d81b60;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            /* Spielerisches Hintergrundmuster (Punkte & dezente Kreise) */
            background-image: 
                radial-gradient(rgba(52, 152, 219, 0.08) 15%, transparent 16%),
                radial-gradient(rgba(241, 196, 15, 0.08) 15%, transparent 16%),
                radial-gradient(rgba(231, 76, 60, 0.05) 10%, transparent 11%);
            background-size: 60px 60px, 40px 40px, 80px 80px;
            background-position: 0 0, 20px 20px, 40px 40px;
            color: var(--primary-color);
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 3rem;
            margin: 0;
            font-weight: 800;
            color: var(--primary-color);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
            letter-spacing: 2px;
        }

        /* 3-Column Layout for ACE */
        .kids-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .kid-card {
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .kid-card:hover {
            transform: translateY(-3px);
        }

        /* Kid Specific Styles */
        .card-artur { background-color: var(--artur-color); }
        .card-artur h2 { color: var(--artur-header); border-bottom-color: rgba(30, 136, 229, 0.2); }
        
        .card-cesar { background-color: var(--cesar-color); }
        .card-cesar h2 { color: var(--cesar-header); border-bottom-color: rgba(245, 124, 0, 0.2); }
        
        .card-emelia { background-color: var(--emelia-color); }
        .card-emelia h2 { color: var(--emelia-header); border-bottom-color: rgba(216, 27, 96, 0.2); }

        .kid-card h2 {
            text-align: center;
            margin-top: 0;
            padding-bottom: 12px;
            border-bottom: 3px solid;
            font-size: 1.8rem;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 0.9rem;
        }

        select, input[type="time"], input[type="number"], textarea, input[type="text"], input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            font-family: inherit;
            background-color: rgba(255, 255, 255, 0.9);
        }

        /* Section Cards */
        .section-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
        }

        .section-card h3 {
            margin-top: 0;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 8px;
            font-size: 1.4rem;
        }

        .grid-2-col {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .upload-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .upload-box {
            background: #fdfdfd;
            border: 2px dashed #cbd5e1;
            padding: 15px;
            border-radius: 10px;
        }

        .upload-box label {
            color: #475569;
        }

        button {
            display: block;
            width: 100%;
            max-width: 350px;
            margin: 30px auto 10px auto;
            padding: 15px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3);
            transition: all 0.2s;
        }

        button:hover {
            background-color: #27ae60;
            box-shadow: 0 6px 15px rgba(46, 204, 113, 0.4);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <header>
        <h1>ACE-O-Meter</h1>
    </header>

    <form id="trackerForm">
        
        <!-- KIDS SECTION -->
        <div class="kids-grid">
            
            <!-- ARTUR (Baby Blue) -->
            <div class="kid-card card-artur">
                <h2>Artur</h2>
                <div class="form-group">
                    <label>Aufwachen</label>
                    <input type="time" name="artur_wake">
                </div>
                <div class="form-group">
                    <label>Einschlafen</label>
                    <input type="time" name="artur_sleep">
                </div>
                <div class="form-group">
                    <label>Gefühl beim Aufwachen</label>
                    <select name="artur_mood_wake">
                        <option value="1">1 – Sehr schlecht 😫</option>
                        <option value="2">2 – Schlecht 🙁</option>
                        <option value="3">3 – Neutral 😐</option>
                        <option value="4">4 – Gut 🙂</option>
                        <option value="5">5 – Sehr gut 😁</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Gefühl nach der Schule</label>
                    <select name="artur_mood_school">
                        <option value="1">1 – Sehr schlecht 😫</option>
                        <option value="2">2 – Schlecht 🙁</option>
                        <option value="3">3 – Neutral 😐</option>
                        <option value="4">4 – Gut 🙂</option>
                        <option value="5">5 – Sehr gut 😁</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Gewalt (Anzahl Vorfälle)</label>
                    <input type="number" name="artur_violence" min="0" value="0">
                </div>
                <div class="form-group">
                    <label>Schimpfwörter (Anzahl)</label>
                    <input type="number" name="artur_words" min="0" value="0">
                </div>
                <div class="form-group">
                    <label>Ecke Zustand</label>
                    <select name="artur_corner_state">
                        <option value="1">1 – Absolute Verwüstung 💣</option>
                        <option value="2">2 – Unordentlich 🧸</option>
                        <option value="3">3 – Akzeptabel 😐</option>
                        <option value="4">4 – Ordentlich 🙂</option>
                        <option value="5">5 – Blitzblank ✨</option>
                    </select>
                </div>
            </div>

            <!-- CÉSAR (Gold) -->
            <div class="kid-card card-cesar">
                <h2>César</h2>
                <div class="form-group">
                    <label>Aufwachen</label>
                    <input type="time" name="cesar_wake">
                </div>
                <div class="form-group">
                    <label>Einschlafen</label>
                    <input type="time" name="cesar_sleep">
                </div>
                <div class="form-group">
                    <label>Gefühl beim Aufwachen</label>
                    <select name="cesar_mood_wake">
                        <option value="1">1 – Sehr schlecht 😫</option>
                        <option value="2">2 – Schlecht 🙁</option>
                        <option value="3">3 – Neutral 😐</option>
                        <option value="4">4 – Gut 🙂</option>
                        <option value="5">5 – Sehr gut 😁</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Gefühl nach der Schule</label>
                    <select name="cesar_mood_school">
                        <option value="1">1 – Sehr schlecht 😫</option>
                        <option value="2">2 – Schlecht 🙁</option>
                        <option value="3">3 – Neutral 😐</option>
                        <option value="4">4 – Gut 🙂</option>
                        <option value="5">5 – Sehr gut 😁</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Gewalt (Anzahl Vorfälle)</label>
                    <input type="number" name="cesar_violence" min="0" value="0">
                </div>
                <div class="form-group">
                    <label>Schimpfwörter (Anzahl)</label>
                    <input type="number" name="cesar_words" min="0" value="0">
                </div>
                <div class="form-group">
                    <label>Ecke Zustand</label>
                    <select name="cesar_corner_state">
                        <option value="1">1 – Absolute Verwüstung 💣</option>
                        <option value="2">2 – Unordentlich 🧸</option>
                        <option value="3">3 – Akzeptabel 😐</option>
                        <option value="4">4 – Ordentlich 🙂</option>
                        <option value="5">5 – Blitzblank ✨</option>
                    </select>
                </div>
            </div>

            <!-- EMELIA (Baby Pink) -->
            <div class="kid-card card-emelia">
                <h2>Emelia</h2>
                <div class="form-group">
                    <label>Aufwachen</label>
                    <input type="time" name="emelia_wake">
                </div>
                <div class="form-group">
                    <label>Einschlafen</label>
                    <input type="time" name="emelia_sleep">
                </div>
                <div class="form-group">
                    <label>Gefühl beim Aufwachen</label>
                    <select name="emelia_mood_wake">
                        <option value="1">1 – Sehr schlecht 😫</option>
                        <option value="2">2 – Schlecht 🙁</option>
                        <option value="3">3 – Neutral 😐</option>
                        <option value="4">4 – Gut 🙂</option>
                        <option value="5">5 – Sehr gut 😁</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Gefühl nach der Schule</label>
                    <select name="emelia_mood_school">
                        <option value="1">1 – Sehr schlecht 😫</option>
                        <option value="2">2 – Schlecht 🙁</option>
                        <option value="3">3 – Neutral 😐</option>
                        <option value="4">4 – Gut 🙂</option>
                        <option value="5">5 – Sehr gut 😁</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Gewalt (Anzahl Vorfälle)</label>
                    <input type="number" name="emelia_violence" min="0" value="0">
                </div>
                <div class="form-group">
                    <label>Schimpfwörter (Anzahl)</label>
                    <input type="number" name="emelia_words" min="0" value="0">
                </div>
                <div class="form-group">
                    <label>Ecke Zustand</label>
                    <select name="emelia_corner_state">
                        <option value="1">1 – Absolute Verwüstung 💣</option>
                        <option value="2">2 – Unordentlich 🧸</option>
                        <option value="3">3 – Akzeptabel 😐</option>
                        <option value="4">4 – Ordentlich 🙂</option>
                        <option value="5">5 – Blitzblank ✨</option>
                    </select>
                </div>
            </div>

        </div>

        <!-- ALLGEMEINES & HOUSEHOLD -->
        <div class="section-card">
            <h3>Allgemeines & Hauszustand</h3>
            
            <div class="grid-2-col">
                <div class="form-group">
                    <label>Wer war dran?</label>
                    <select name="who_is_up">
                        <option value="">-- Bitte wählen --</option>
                        <option value="artur">Artur</option>
                        <option value="cesar">César</option>
                        <option value="emelia">Emelia</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Wer war im Elternschlafzimmer?</label>
                    <select name="parents_bed">
                        <option value="none">Niemand</option>
                        <option value="artur">Artur</option>
                        <option value="cesar">César</option>
                        <option value="emelia">Emelia</option>
                        <option value="multiple">Mehrere</option>
                    </select>
                </div>
            </div>

            <div class="grid-2-col" style="margin-top: 15px;">
                <div class="form-group">
                    <label>Küche Zustand</label>
                    <select name="kitchen_state">
                        <option value="1">1 – Chaos & Vollgestellt 🍽️</option>
                        <option value="2">2 – Dreckig 🍳</option>
                        <option value="3">3 – Akzeptabel / Halbvoll 😐</option>
                        <option value="4">4 – Weitgehend sauber 🙂</option>
                        <option value="5">5 – Perfekt aufgeräumt ✨</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Wohnzimmer Zustand</label>
                    <select name="living_room_state">
                        <option value="1">1 – Spielzeug-Explosion 🎲</option>
                        <option value="2">2 – Unordentlich 🛋️</option>
                        <option value="3">3 – Akzeptabel 😐</option>
                        <option value="4">4 – Ordentlich 🙂</option>
                        <option value="5">5 – Aufgeräumt & Clean ✨</option>
                    </select>
                </div>
            </div>

            <div class="form-group" style="margin-top: 15px;">
                <label>Heutige Gute Nacht Geschichte</label>
                <input type="text" name="bedtime_story" placeholder="Thema oder Inhalt der Geschichte">
            </div>

            <div class="form-group">
                <label>Zusätzliche Notizen</label>
                <textarea name="general_notes" rows="3" placeholder="Besondere Vorkommnisse, Krankheiten, etc."></textarea>
            </div>
        </div>

        <!-- DATA UPLOAD SECTION -->
        <div class="section-card">
            <h3>Data Upload</h3>
            <p style="font-size: 0.85rem; color: #64748b; margin-top: -10px; margin-bottom: 20px;">
            </p>
            
            <div class="upload-grid">
                <div class="upload-box">
                    <div class="form-group">
                        <label>📈 Bomad Upload</label>
                        <input type="file" name="upload_bomad">
                    </div>
                </div>
                
                <div class="upload-box">
                    <div class="form-group">
                        <label>🔄 Loop Upload</label>
                        <input type="file" name="upload_loop">
                    </div>
                </div>
                
                <div class="upload-box">
                    <div class="form-group">
                        <label>🎡 Mein Gefühlsrad Upload</label>
                        <input type="file" name="upload_emotional_wheel">
                    </div>
                </div>
            </div>
        </div>

        <button type="submit">Daten in AWS speichern</button>

    </form>

    <script>
        document.getElementById('trackerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Daten bereit für das AWS API Gateway!');
        });
    </script>
</body>
</html>
